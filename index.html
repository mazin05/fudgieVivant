<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fudgie Vivant</title>

<!-- Tailwind v4 CDN -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  body { font-family: 'Inter', sans-serif; }
  .font-display { font-family: 'Playfair Display', serif; }
</style>
</head>

<body class="bg-[#0f0f0f] text-white">

<!-- NAV -->
<header class="fixed w-full z-50 backdrop-blur bg-black/40 border-b border-white/10">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    
    <h1 class="font-display text-2xl tracking-wide">
      Fudgie <span class="text-pink-400">Vivant</span>
    </h1>

    <nav class="hidden md:flex gap-8 text-sm text-white/70">
      <a href="#shop" class="hover:text-white">Shop</a>
      <a href="#menu" class="hover:text-white">Menu</a>
      <a href="#gallery" class="hover:text-white">Gallery</a>
    </nav>

  </div>
</header>

<!-- HERO -->
<section class="min-h-screen flex items-center justify-center text-center px-6">

  <div class="max-w-3xl">
    <h2 class="font-display text-5xl md:text-7xl leading-tight">
      Artisan <br>
      <span class="text-pink-400">Brownies</span>
    </h2>

    <p class="mt-6 text-white/60 text-lg">
      Handmade with premium chocolate & love — every bite melts.
    </p>

    <div class="mt-8 flex justify-center gap-4">
      <a href="#shop" class="px-6 py-3 bg-pink-500 rounded-full hover:scale-105 transition">
        Order Now
      </a>
      <a href="#menu" class="px-6 py-3 border border-white/20 rounded-full hover:bg-white/10 transition">
        View Menu
      </a>
    </div>
  </div>

</section>

<!-- SHOP -->
<section id="shop" class="py-20 px-6 max-w-7xl mx-auto">

  <h3 class="text-3xl font-display mb-12 text-center">
    Our Brownies
  </h3>

  <div id="shopGrid" class="grid md:grid-cols-3 gap-8"></div>

</section>

<!-- MENU -->
<section id="menu" class="py-20 px-6 bg-[#141414]">

  <div class="max-w-4xl mx-auto">
    <h3 class="text-3xl font-display text-center mb-10">Menu</h3>

    <table class="w-full text-left text-sm">
      <thead class="text-white/60 border-b border-white/10">
        <tr>
          <th class="py-3">Code</th>
          <th>Name</th>
          <th>Price</th>
        </tr>
      </thead>

      <tbody id="menuBody"></tbody>
    </table>
  </div>

</section>

<!-- GALLERY -->
<section id="gallery" class="py-20 px-6 max-w-7xl mx-auto">

  <h3 class="text-3xl font-display text-center mb-10">Gallery</h3>

  <div class="grid md:grid-cols-3 gap-6">
    <img src="./img/b1.jpg" class="rounded-xl hover:scale-105 transition">
    <img src="./img/b2.jpg" class="rounded-xl hover:scale-105 transition">
    <img src="./img/b3.jpg" class="rounded-xl hover:scale-105 transition">
  </div>

</section>

<!-- FOOTER -->
<footer class="py-12 text-center border-t border-white/10">

  <p class="text-white/50 text-sm">
    © 2024 Fudgie Vivant — Crafted with ❤️
  </p>

  <a href="https://instagram.com/fudgie.vivant" target="_blank"
     class="block mt-3 text-pink-400">
    @fudgie.vivant
  </a>

</footer>

<script src="index.js"></script>
</body>
</html>
